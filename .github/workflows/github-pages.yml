name: Deploy to GitHub Pages

# Staging / acceptance environment. Publishes the `acc` branch to GitHub Pages
# so changes can be reviewed before they go live on Cloudflare (production,
# from `main` — see deploy.yml). Promote with: merge acc -> main.
#
# GitHub Pages serves under the project sub-path, so the build uses the base
# path resolved by configure-pages — unlike the Cloudflare build, which always
# serves at the domain root.
#
# ONE-TIME SETUP (required, owner only — CI cannot do this):
#   Repo → Settings → Pages → "Build and deployment" → Source: "GitHub Actions".
on:
  push:
    branches:
      - acc
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-progress run. Separate group
# from the Cloudflare workflow so the two deploys run independently.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Resolve Pages base path
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Serve under the project sub-path (e.g. /pack-website/) and point
          # canonical/sitemap URLs at the Pages origin.
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
