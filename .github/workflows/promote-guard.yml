name: Enforce promotion flow

# Guards the production branch: a pull request into `main` is only allowed from
# `acc` (the staging branch that deploys to GitHub Pages). This makes "you can't
# reach main without going through acc" enforceable — combine it with a branch
# protection rule on `main` that requires this check to pass and requires a PR
# before merging (so direct pushes are blocked too).
on:
  pull_request:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    name: Only promote from acc
    steps:
      - name: Require the source branch to be acc
        if: ${{ github.head_ref != 'acc' }}
        run: |
          echo "::error::PRs into main must come from 'acc' (staging). Merge your changes into acc first, review them on GitHub Pages, then open an acc -> main promotion PR."
          exit 1
      - name: OK
        run: echo "Promotion from acc -> main — allowed."
