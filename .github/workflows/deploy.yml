name: Deploy to GitHub Pages

# Publishes a live preview of the site to GitHub Pages.
# Runs on pushes to main and to the active feature branch, plus manually.
#
# One-time setup in the repo: Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". (If deploying from a non-default branch is blocked,
# allow it under Settings → Environments → github-pages → deployment branches.)
on:
  push:
    branches:
      - main
      - claude/modest-goldberg-ygudtg
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve Pages base path
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Enable Pages (GitHub Actions source) automatically on first run,
          # so no manual Settings → Pages toggle is needed.
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Serve under the project sub-path (e.g. /pack-website/) and point
          # canonical/sitemap URLs at the Pages origin.
          SITE_URL: ${{ steps.pages.outputs.origin }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
