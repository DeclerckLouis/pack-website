name: Deploy to Cloudflare Pages

# Builds the site and deploys it to Cloudflare Pages.
#   - push to main          -> production deploy (www.packetflow.be)
#   - any other branch / PR -> preview deploy
#
# ONE-TIME SETUP (owner only — CI cannot do this), see the handoff brief §1b:
#   1. Cloudflare dashboard -> Workers & Pages -> Create -> Pages -> Direct
#      Upload; name the project `packetflow` (must match --project-name).
#   2. Project settings -> Production branch -> `main`.
#   3. Create an API token with the "Cloudflare Pages -> Edit" permission.
#   4. Add repo secrets CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
#   5. Add the custom domain www.packetflow.be + an apex -> www redirect.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & deploy
    # Exposed at job level so the deploy step's `if:` can test for it (secrets
    # can't be referenced directly in an `if` expression).
    env:
      CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        env:
          # Canonical + sitemap always point at production. Cloudflare Pages
          # serves at the domain root, so the base path is always "/".
          SITE_URL: https://www.packetflow.be
          BASE_PATH: /
        run: npm run build

      - name: Deploy to Cloudflare Pages
        # Skips (CI stays green) until the owner adds the Cloudflare secrets
        # — see §1b. Once CLOUDFLARE_API_TOKEN exists, deploys run normally.
        if: ${{ env.CF_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # main -> production; any other branch/PR -> preview deployment
          command: pages deploy dist --project-name=packetflow --branch=${{ github.head_ref || github.ref_name }}
